site_name: DX-LR20 Raspberry Pi Control Center
site_description: GitHub-style documentation for the Raspberry Pi, DX-LR20, Heltec, Windows GUI/CLI, hotspot, dashboard, and reliable image-transfer project.
repo_name: DXLR20-Control-Center

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true

nav:
  - Start Here: start-here.md
  - Required Files: required-files.md
  - Upload to GitHub: upload-to-github.md
  - Home: index.md
  - Setup:
      - Hardware: setup/hardware.md
      - Operating system: setup/os.md
      - Radio configuration: setup/radio.md
      - Raspberry Pi installation: setup/raspberry-pi.md
      - First test: setup/first-test.md
  - Components:
      - Raspberry Pi controller: components/raspberry-pi-controller.md
      - Windows GUI: components/windows-gui.md
      - Windows CLI: components/windows-cli.md
      - Heltec remote: components/heltec.md
      - Web dashboard: components/web-dashboard.md
  - Reference:
      - Commands: reference/commands.md
      - Status replies: reference/status-replies.md
      - IMG2 protocol: reference/img2-protocol.md
      - Configuration: reference/configuration.md
      - Version compatibility: reference/versions.md
      - FAQ: reference/faq.md
      - Changelog: reference/changelog.md
      - External sources: reference/sources.md
  - Operations:
      - Troubleshooting: operations/troubleshooting.md
      - Security and safety: operations/security.md
      - Maintenance: operations/maintenance.md
  - Development:
      - Architecture: development/architecture.md
      - Testing: development/testing.md
      - Contributing: development/contributing.md
